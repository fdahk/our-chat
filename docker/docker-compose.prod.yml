# our-chat 生产部署编排（镜像在服务器本地构建，不跨墙拉/推）。
# 应用镜像(server/gateway/web)用 build: 就地构建；基础镜像(postgres/redis)仍走 daemon 镜像加速拉取。
#
# 配置分层（重要）：
#   ① 通用、非机密、哪都一样 → 本文件 environment: 里用 ${VAR:-默认值}，无需任何 env 文件即可跑。
#   ② 机密 + ③ 因环境而异的非机密 → 由 GitHub Actions 部署时根据 Secrets/Variables 在服务器生成 .env，
#      经 env_file 注入。服务器上没有任何需要手工维护的配置。
#
# .env 由 .github/workflows/deploy.yml 每次部署自动重写，内容仅含 ②③：
#   POSTGRES_USER/POSTGRES_DB/POSTGRES_PASSWORD、JWT_SECRET、GATEWAY_INTERNAL_TOKEN、
#   OAUTH_ACTIVE_KID、CLIENT_ORIGINS/OAUTH_ISSUER_BASE_URL/OAUTH_WEB_REDIRECT_URI（由 WEB_PUBLIC_ORIGIN 派生）、
#   S3_ENDPOINT/S3_REGION/S3_BUCKET/S3_PUBLIC_BASE_URL/S3_ACCESS_KEY/S3_SECRET_KEY
# OAuth 私钥同样由 Action 写到 ./keys/oauth-private-prod.pem。
#
# web 的 VITE_SERVER_ORIGIN/VITE_AGENT_API_BASE 由 WEB_PUBLIC_ORIGIN 派生(部署脚本 export 后注入 build)。
name: our-chat

services:
  postgres:
    image: postgres:16-alpine
    container_name: our-chat-postgres
    restart: unless-stopped
    # 只给 DB 自己的凭据，不注入应用机密。密码来自 .env（dotenv 替换）。
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 未设置（应由 CI 写入 .env）}
      POSTGRES_DB: ${POSTGRES_DB:-our_chat}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-our_chat}']
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: '512mb'
    networks: [our-chat]

  redis:
    image: redis:7-alpine
    container_name: our-chat-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'no', '--save', '']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [our-chat]

  server:
    # 服务器本地构建(镜像不跨墙)。compose 在 repo/docker/ 运行,故上下文 = ../server(git 拉取的源码)。
    build:
      context: ../server
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
    image: our-chat-server:local
    container_name: our-chat-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ②③（机密 + 环境相关）由 CI 生成的 .env 注入
    env_file:
      - .env
    # ①（通用、非机密）默认值；同名键 environment 优先于 env_file，作为权威默认。
    environment:
      NODE_ENV: production
      PORT: '3007'
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-our_chat}
      REDIS_URL: redis://redis:6379
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OAUTH_PRIVATE_KEY_FILE: /app/keys/oauth-private-prod.pem
      OAUTH_RETIRED_KIDS: ${OAUTH_RETIRED_KIDS:-}
      OAUTH_AT_TTL_SEC: ${OAUTH_AT_TTL_SEC:-900}
      OAUTH_RT_TTL_SEC: ${OAUTH_RT_TTL_SEC:-2592000}
      OAUTH_ID_TTL_SEC: ${OAUTH_ID_TTL_SEC:-900}
      OAUTH_CODE_TTL_SEC: ${OAUTH_CODE_TTL_SEC:-60}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    # 生产 OAuth 私钥由服务器 keys/ 只读挂载（Action 写入，不进镜像/仓库）。
    volumes:
      - ./keys:/app/keys:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3007/health']
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3
    # our-chat 内网 + 与 agent-server 互通的共享网络（供 agent 经 oc-shared 访问本服务的 JWKS）
    networks: [our-chat, oc-shared]

  gateway:
    # 服务器本地构建(镜像不跨墙)。compose 在 repo/docker/ 运行,故上下文 = ../gateway(git 拉取的源码)。
    build:
      context: ../gateway
      args:
        GOPROXY_URL: 'https://goproxy.cn,direct'
    image: our-chat-gateway:local
    container_name: our-chat-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # 机密（JWT_SECRET / GATEWAY_INTERNAL_TOKEN）来自 .env
    env_file:
      - .env
    environment:
      GATEWAY_ADDR: ':8090'
      UPSTREAM_BASE_URL: http://server:3007
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8090/healthz']
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [our-chat]

  web:
    # 服务器本地构建(镜像不跨墙)。上下文 = ../web；VITE_* 在编译期内联进 bundle。
    # VITE_SERVER_ORIGIN/VITE_AGENT_API_BASE 由 WEB_PUBLIC_ORIGIN 派生(部署脚本 export 后注入 build)。
    build:
      context: ../web
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
        VITE_SERVER_ORIGIN: ${WEB_PUBLIC_ORIGIN:?WEB_PUBLIC_ORIGIN 未设置（应由 CI export）}
        VITE_AGENT_API_BASE: ${WEB_PUBLIC_ORIGIN}/agent/api
    image: our-chat-web:local
    container_name: our-chat-web
    restart: unless-stopped
    depends_on:
      - server
      - gateway
    ports:
      - '80:80'
      - '443:443'
    # 边缘路由策略外置：改代理/限额无需重建前端镜像，只改挂载文件后 reload。
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      # TLS：certbot 证书目录整挂(live 下是软链,必须挂 /etc/letsencrypt 整体)只读给 nginx；
      # certbot-www 是续期 HTTP-01 的 webroot(certbot 写挑战文件,nginx 在 80 端口读)。
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot:ro
    # 加入 oc-shared，让 nginx 能同源反代到 agent-node-server:3101（/agent/）
    networks: [our-chat, oc-shared]

volumes:
  postgres_data:
    name: our-chat-postgres-data

networks:
  our-chat:
    driver: bridge
  # 跨项目共享网络（与 agent-server 互通）；以 external 引用，由部署脚本幂等创建（谁先部署谁建）。
  # nginx(web) 经此网络同源反代 /agent/ → agent-node-server:3101；agent 也经此访问本服务 JWKS。
  oc-shared:
    external: true
