# coturn STUN/TURN 配置(静态、非机密部分)。
#
# 机密与环境相关项不写进本文件(本文件是只读挂载、进仓库,不含任何密钥):
#   · static-auth-secret(与服务端共享的 HMAC 密钥)→ 由 compose command 以 --static-auth-secret 注入
#   · external-ip(服务器公网 IP)               → 由 compose command 以 --external-ip 注入
# 详见 docs/技术方案/音视频通话-NAT穿透与自建TURN方案.md。

# ── 监听 ──
# STUN/TURN 明文(同端口收 UDP + TCP)
listening-port=3478
# TURNS:TLS over TCP,用于穿严格防火墙(公司网/只放行 443/5349 的网络)
tls-listening-port=5349
fingerprint

# ── 凭据:短期 HMAC(TURN REST API)──
# 客户端凭据由服务端用共享 secret 现算(username=到期时间戳:uid,credential=base64(HMAC-SHA1)),
# coturn 用同一 secret 校验时效与签名。secret 本体由 --static-auth-secret 注入。
use-auth-secret
realm=tujiang.tech

# ── relay 端口段 ──
# 收窄到一小段(便于云防火墙放行 + 降低暴露面);须与云安全组放行的 UDP 段一致。
min-port=49160
max-port=49200

# ── TLS 证书(复用 nginx 的 Let's Encrypt,只读挂载 /etc/letsencrypt)──
cert=/etc/letsencrypt/live/tujiang.tech/fullchain.pem
pkey=/etc/letsencrypt/live/tujiang.tech/privkey.pem
no-tlsv1
no-tlsv1_1

# ── 安全硬化 ──
# 关闭 telnet 管理 CLI
no-cli
# 禁止把 TURN 当跳板中继到内网/回环/组播:否则客户端可经 relay 打到 DB/Redis/云元数据(SSRF 式滥用)。
# 回环由下面的 127.0.0.0/8 与 ::1 deny 覆盖(no-loopback-peers 在 4.6.3 已不识别)。
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# ── 配额(防带宽/会话被打爆)──
user-quota=12
total-quota=100
