# nginx 主配置(http 全局)。边缘入口策略与前端构建产物解耦:
# 本文件与 conf.d/default.conf 由 compose 以 :ro 挂载进 web 容器,改路由/限额无需重建镜像。
worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 上传体积上限,与 server 端 multer 限制(100MB)对齐。
    # nginx 默认 client_max_body_size 为 1MB,会把头像/单文件/分片(均 >1MB)直接 413 卡掉。
    client_max_body_size 100m;

    include /etc/nginx/conf.d/*.conf;
}
