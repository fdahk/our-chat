# our-chat 边缘入口:静态托管 SPA + 同源反向代理(避免跨域 cookie 问题)。
# 唯一对外服务,server/gateway 仅在内网,nginx 是单一 ingress。

# ── HTTP(80):放行 ACME 续期验证(webroot) + 其余 301 跳 HTTPS ──
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS(443):唯一对外入口 ──
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # 证书由 certbot(Let's Encrypt, HTTP-01)签发,挂载自宿主 /etc/letsencrypt(含 live 软链)。
    ssl_certificate     /etc/letsencrypt/live/tujiang.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tujiang.tech/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── 业务 API / OAuth / 用户(同源,带 HttpOnly cookie)→ Node server ──
    location /api/ {
        proxy_pass http://server:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /oauth/ {
        proxy_pass http://server:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /user/ {
        proxy_pass http://server:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Socket.io 实时层(server)── 需要 WebSocket 升级
    location /socket.io/ {
        proxy_pass http://server:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── Go 连接网关(原生 WebSocket)──
    location /ws {
        proxy_pass http://gateway:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── JWKS / OIDC 发现(server)── 供 agent-server 等下游验签;JWKS 本就公开
    location /.well-known/ {
        proxy_pass http://server:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── agent-server(AI 后端) 同源反代 ── 经共享网络 oc-shared 到 agent 容器 :3101
    #   · 用 resolver + 变量 proxy_pass 做惰性解析:agent 未部署时本 nginx 仍能启动(请求时才 502),
    #     不把 our-chat 启动耦合到 agent 是否在线(跨 compose 项目)。
    #   · rewrite 剥掉 /agent/ 前缀:/agent/api/x → /api/x(对齐 agent 的 /api 路由)。
    #   · SSE 流式:关缓冲 + 长读超时,否则增量 token 会被缓冲/掐断。
    location /agent/ {
        resolver 127.0.0.11 valid=30s;            # Docker 内嵌 DNS
        rewrite ^/agent/(.*)$ /$1 break;
        set $agent_upstream agent-node-server:3101;
        proxy_pass http://$agent_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ── SPA 前端:其余路径回退到 index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
