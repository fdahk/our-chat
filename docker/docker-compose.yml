# our-chat 生产全栈编排:nginx(边缘入口)+ server(Node 业务)+ gateway(Go 长连接)+ 中间件
#
# 用法(在本目录 docker/ 下执行,自动加载同目录 .env):
#   cd docker && cp .env.example .env      首次:填好 JWT_SECRET 等
#   docker compose up -d --build           构建并启动全栈
#   docker compose down                    停止(保留数据卷)
#   docker compose down -v                 全清(含数据卷)
#
# 本地开发请改用 docker-compose.dev.yml(只起中间件,业务跑宿主机)。
name: our-chat

# 单一部署配置源:同目录 .env 整体注入各容器(对齐 docker/.env.example)。
x-env-file: &env_file
  - .env

services:
  postgres:
    image: postgres:16-alpine
    container_name: our-chat-postgres
    restart: unless-stopped
    env_file: *env_file
    environment:
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-our_chat}']
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: '512mb'
    networks: [our-chat]

  redis:
    image: redis:7-alpine
    container_name: our-chat-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'no', '--save', '']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [our-chat]

  server:
    image: ${SERVER_IMAGE:-our-chat-server:local}
    build:
      context: ../server
      target: runner
    container_name: our-chat-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: *env_file
    environment:
      NODE_ENV: production
      PORT: 3007
    volumes:
      - ../server/keys:/app/keys:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3007/health']
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3
    networks: [our-chat]

  gateway:
    image: ${GATEWAY_IMAGE:-our-chat-gateway:local}
    build:
      context: ../gateway
    container_name: our-chat-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: *env_file
    environment:
      GATEWAY_ADDR: ':8090'
      UPSTREAM_BASE_URL: http://server:3007
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8090/healthz']
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [our-chat]

  web:
    image: ${WEB_IMAGE:-our-chat-web:local}
    build:
      context: ../web
    container_name: our-chat-web
    restart: unless-stopped
    depends_on:
      - server
      - gateway
    ports:
      - '${WEB_PORT:-8080}:80'
    # 边缘路由策略外置:改代理/限额无需重建前端镜像,只改挂载文件后 reload
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [our-chat]

volumes:
  postgres_data:
    name: our-chat-postgres-data

networks:
  our-chat:
    driver: bridge
