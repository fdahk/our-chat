name: deploy

# 提交即自动部署（镜像在服务器本地构建，不跨墙）：
#   推送到 main → runner checkout 源码 → scp 构建上下文到服务器 → SSH 生成 .env/私钥 → docker compose build → up。
# 为什么源码走 runner→服务器 scp，而不在服务器 git clone：国内服务器 git clone github 会被 GFW 重置
#   (GnuTLS recv error -110)。runner 在 GitHub 内网,checkout 极快;源码仅 ~MB,经已打通的 SSH 通道 scp 到
#   服务器很稳(此前失败的是 runner→国内 registry 推几百 MB 镜像层,不是这点小源码)。
# 为什么不在 CI build 再推镜像：大镜像跨墙拉/推都不稳(GHCR blob 被墙、Docker Hub 公益源大层易抖、
#   TCR runner→国内上传大层会断)。改服务器本地 build:依赖走国内源(npmmirror/goproxy.cn,compose
#   build-arg 注入)，基础镜像走 daemon 镜像加速，全程不跨墙传大层。
# 配置分层：① 通用非机密在 compose 默认值；② 其余(机密 + 因环境而异的非机密)统一放 GitHub Secrets。
#   ② 由本工作流在部署时统一注入、在服务器生成 .env，服务器零手工维护。
# 想用 dev 触发，把 branches 改成 [dev]；workflow_dispatch 支持手动触发。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 部署到服务器（本地构建）
    runs-on: ubuntu-latest
    # 读取 environment(pro) 作用域下的 Secrets（SSH 私钥、机密、WEB_PUBLIC_ORIGIN 等）
    environment: pro
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      # runner 在 GitHub 内网，checkout 本次提交的源码（作为待 scp 的构建上下文）
      - uses: actions/checkout@v4

      # 先校验 environment(pro) 里的 Secrets 是否都读到（缺啥报啥；也能验证 environment 名字配对）
      - name: 预检必填 Secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_INTERNAL_TOKEN: ${{ secrets.GATEWAY_INTERNAL_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OAUTH_PRIVATE_KEY_B64: ${{ secrets.OAUTH_PRIVATE_KEY_B64 }}
          WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN }}
          OAUTH_ACTIVE_KID: ${{ secrets.OAUTH_ACTIVE_KID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
        run: |
          miss=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY POSTGRES_PASSWORD JWT_SECRET GATEWAY_INTERNAL_TOKEN S3_ACCESS_KEY S3_SECRET_KEY OAUTH_PRIVATE_KEY_B64 WEB_PUBLIC_ORIGIN OAUTH_ACTIVE_KID S3_ENDPOINT S3_REGION S3_BUCKET S3_PUBLIC_BASE_URL; do
            if [ -z "${!v:-}" ]; then echo "❌ 缺少 Secret：$v"; miss=1; else echo "✓ Secret $v 已设置"; fi
          done
          if [ "$miss" -ne 0 ]; then
            echo "::error::有必填 Secret 读不到。确认它们都配在 environment『pro』的 Secrets 页下（本 job 已声明 environment: pro）。若你的环境名不是 pro，请改 workflow 里的 environment 值。"
            exit 1
          fi
          echo "✅ 所有必填 Secret 齐全（environment: pro 读取正常）"

      # 把构建上下文(三服务源码 + docker/) scp 到服务器部署目录。
      # 仅 git 跟踪的文本源码(无 node_modules/dist),~MB 级,经 SSH 通道很稳。overwrite 覆盖旧源码;
      # 不删服务器侧专属文件(.env/keys/certbot-www 不在源码里,scp 不动它们)。
      - name: 同步构建上下文到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'server,gateway,web,docker'
          target: ${{ secrets.DEPLOY_PATH || '/opt/our-chat' }}
          overwrite: true

      - name: 生成 .env/私钥 + 本地构建 + 滚动重启
        uses: appleboy/ssh-action@v1.2.0
        env:
          GIT_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/our-chat' }}
          # —— ② 机密 + 因环境而异的非机密,统一走 GitHub Secrets ——
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_INTERNAL_TOKEN: ${{ secrets.GATEWAY_INTERNAL_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OAUTH_PRIVATE_KEY_B64: ${{ secrets.OAUTH_PRIVATE_KEY_B64 }}
          WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN }}
          OAUTH_ACTIVE_KID: ${{ secrets.OAUTH_ACTIVE_KID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GIT_SHA,DEPLOY_PATH,POSTGRES_PASSWORD,JWT_SECRET,GATEWAY_INTERNAL_TOKEN,S3_ACCESS_KEY,S3_SECRET_KEY,OAUTH_PRIVATE_KEY_B64,WEB_PUBLIC_ORIGIN,OAUTH_ACTIVE_KID,S3_ENDPOINT,S3_REGION,S3_BUCKET,S3_PUBLIC_BASE_URL,POSTGRES_USER,POSTGRES_DB
          # ssh-action 内是轮询(每 10s tail 一次,顺便给 SSH 通道喂流量防弱网空闲被重置),
          # 实际 build+up 由 ci-deploy.sh 用 setsid 脱离本会话后台跑(断连也跑完)。放宽到 35m 覆盖轮询上限。
          command_timeout: 35m
          script_stop: true
          # 全部服务器侧逻辑收敛进已 scp 的 docker/ci-deploy.sh(生成 .env/私钥 → 后台 build+up → 轮询结果),
          # 这样 drone-ssh 的逐行包裹只作用于这一条调用,不会破坏脚本里的 heredoc/循环等复合结构。
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH}/docker"
            bash ci-deploy.sh
