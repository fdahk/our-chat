name: deploy

# 提交即自动部署：推送到 main → 构建 3 个镜像推腾讯 TCR → SSH 到服务器生成 .env/私钥 → 登录TCR拉取 → up。
# 用腾讯 TCR(基础版,广州,同云):服务器拉取又快又稳。GHCR blob 国内被墙、Docker Hub 公益镜像源大层易抖动,故弃用。
# 配置分层：① 通用非机密在 compose 默认值；② 其余(机密 + 因环境而异的非机密)统一放 GitHub Secrets(不分 Variables)。
# ② 由本工作流在部署时统一注入、在服务器生成 .env，服务器零手工维护。
# 想用 dev 触发，把 branches 改成 [dev]；workflow_dispatch 支持手动触发。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # 腾讯 TCR 基础版(域名 our-chat.tencentcloudcr.com,命名空间 skillhub)。镜像:skillhub/our-chat-{server,gateway,web}
  IMAGE_PREFIX: our-chat.tencentcloudcr.com/skillhub/our-chat

jobs:
  # ── 1) 并行构建并推送三个服务镜像 ──
  build:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    # web 构建要读 environment(pro) 里的 WEB_PUBLIC_ORIGIN，故此 job 也需声明 environment
    environment: pro
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: server
            context: server
          - name: gateway
            context: gateway
          - name: web
            context: web
    steps:
      - uses: actions/checkout@v4

      - name: 登录 TCR
        uses: docker/login-action@v3
        with:
          registry: our-chat.tencentcloudcr.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: 构建并推送 ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # web 需在构建期烤入「用户实际访问的公开 origin」(构建期变量,无法用 compose 默认覆盖)。
          # secrets 不能用于 strategy.matrix,故在此(step with,secrets 可用)按 name 条件注入。
          # 用 | 块标量让两个 build-arg 各占一行;非 web 项每行求值为空串,被 build-push-action 忽略。
          # VITE_AGENT_API_BASE 走方案A 同源:{公开origin}/agent/api(nginx 反代到 agent 的 /api)。
          build-args: |
            ${{ matrix.name == 'web' && format('VITE_SERVER_ORIGIN={0}', secrets.WEB_PUBLIC_ORIGIN) || '' }}
            ${{ matrix.name == 'web' && format('VITE_AGENT_API_BASE={0}/agent/api', secrets.WEB_PUBLIC_ORIGIN) || '' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
          # 构建缓存存到 registry(而非 GHA 缓存——GHA 缓存 7 天不用就清,稀疏部署必失效,
          # 导致依赖层被重建、digest 变化、服务器被迫重下几百 MB)。存进镜像仓库后长期有效:
          # 依赖未变 → 复用缓存 → 依赖层 digest 稳定 → 服务器拉取时直接跳过、只下变化的代码层。
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:buildcache,mode=max

  # ── 2) 同步部署文件 + 在服务器生成 .env/私钥 + 拉取镜像滚动重启 ──
  deploy:
    name: 部署到服务器
    needs: build
    runs-on: ubuntu-latest
    # 读取 environment(pro) 作用域下的 Secrets/Variables（SSH 私钥等）
    environment: pro
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # 先校验 environment(pro) 里的 Secrets 是否都读到（缺啥报啥；也能验证 environment 名字配对）
      - name: 预检必填 Secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_INTERNAL_TOKEN: ${{ secrets.GATEWAY_INTERNAL_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OAUTH_PRIVATE_KEY_B64: ${{ secrets.OAUTH_PRIVATE_KEY_B64 }}
          WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN }}
          OAUTH_ACTIVE_KID: ${{ secrets.OAUTH_ACTIVE_KID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
        run: |
          miss=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY POSTGRES_PASSWORD JWT_SECRET GATEWAY_INTERNAL_TOKEN S3_ACCESS_KEY S3_SECRET_KEY OAUTH_PRIVATE_KEY_B64 WEB_PUBLIC_ORIGIN OAUTH_ACTIVE_KID S3_ENDPOINT S3_REGION S3_BUCKET S3_PUBLIC_BASE_URL; do
            if [ -z "${!v:-}" ]; then echo "❌ 缺少 Secret：$v"; miss=1; else echo "✓ Secret $v 已设置"; fi
          done
          if [ "$miss" -ne 0 ]; then
            echo "::error::有必填 Secret 读不到。确认它们都配在 environment『pro』的 Secrets 页下（本 job 已声明 environment: pro）。若你的环境名不是 pro，请改 workflow 里的 environment 值。"
            exit 1
          fi
          echo "✅ 所有必填 Secret 齐全（environment: pro 读取正常）"

      # compose 文件与 nginx 配置同步到部署目录（strip_components 去掉 docker/ 前缀）
      - name: 同步 compose + nginx 到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'docker/docker-compose.prod.yml,docker/nginx'
          target: ${{ secrets.DEPLOY_PATH || '/opt/our-chat' }}
          strip_components: 1
          overwrite: true

      - name: 生成 .env/私钥 + 拉取镜像 + 滚动重启
        uses: appleboy/ssh-action@v1.2.0
        env:
          # —— 连接/镜像 ——
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GIT_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/our-chat' }}
          # TCR 私有仓库,服务器拉取需登录
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          # —— ② 机密 + 因环境而异的非机密,统一走 GitHub Secrets ——
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_INTERNAL_TOKEN: ${{ secrets.GATEWAY_INTERNAL_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OAUTH_PRIVATE_KEY_B64: ${{ secrets.OAUTH_PRIVATE_KEY_B64 }}
          WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN }}
          OAUTH_ACTIVE_KID: ${{ secrets.OAUTH_ACTIVE_KID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_PREFIX,GIT_SHA,DEPLOY_PATH,TCR_USERNAME,TCR_PASSWORD,POSTGRES_PASSWORD,JWT_SECRET,GATEWAY_INTERNAL_TOKEN,S3_ACCESS_KEY,S3_SECRET_KEY,OAUTH_PRIVATE_KEY_B64,WEB_PUBLIC_ORIGIN,OAUTH_ACTIVE_KID,S3_ENDPOINT,S3_REGION,S3_BUCKET,S3_PUBLIC_BASE_URL,POSTGRES_USER,POSTGRES_DB
          # 拉 3 个应用镜像 + 首次基础镜像偏慢,默认 10m 会 "Run Command Timeout",放宽到 30m。
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            umask 077
            cd "${DEPLOY_PATH}"
            # keys: OAuth 私钥; certbot-www: HTTPS 证书续期的 webroot 挑战目录
            mkdir -p keys certbot-www

            # 跨项目共享网络（与 agent-server 互通）：compose 以 external 引用，必须先存在。
            # 幂等创建——无论 our-chat 还是 agent-server 谁先部署，都能把它建出来。
            docker network inspect oc-shared >/dev/null 2>&1 || docker network create oc-shared

            # —— 写 OAuth 生产私钥（base64 secret 解码）——
            printf '%s' "${OAUTH_PRIVATE_KEY_B64}" | base64 -d > keys/oauth-private-prod.pem
            # 容器内 server 以非 root 用户(app)运行,uid 与宿主 ubuntu(1000)不同;私钥需对其可读,
            # 否则启动读 key 报 EACCES。单租户服务器 + :ro 挂载,644 可接受。
            chmod 644 keys/oauth-private-prod.pem

            # —— 生成 .env（仅 ②③；①通用默认在 compose）。CLIENT_ORIGINS/OAUTH_* 由 WEB_PUBLIC_ORIGIN 派生，三处天然一致 ——
            {
              echo "POSTGRES_USER=${POSTGRES_USER:-postgres}"
              echo "POSTGRES_DB=${POSTGRES_DB:-our_chat}"
              echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "GATEWAY_INTERNAL_TOKEN=${GATEWAY_INTERNAL_TOKEN}"
              echo "OAUTH_ACTIVE_KID=${OAUTH_ACTIVE_KID}"
              echo "CLIENT_ORIGINS=${WEB_PUBLIC_ORIGIN}"
              echo "OAUTH_ISSUER_BASE_URL=${WEB_PUBLIC_ORIGIN}"
              echo "OAUTH_WEB_REDIRECT_URI=${WEB_PUBLIC_ORIGIN}/oauth/callback"
              echo "S3_ENDPOINT=${S3_ENDPOINT}"
              echo "S3_REGION=${S3_REGION}"
              echo "S3_BUCKET=${S3_BUCKET}"
              echo "S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}"
              echo "S3_ACCESS_KEY=${S3_ACCESS_KEY}"
              echo "S3_SECRET_KEY=${S3_SECRET_KEY}"
            } > .env
            chmod 600 .env

            # 应用镜像在腾讯 TCR(私有仓库),先登录(基础版企业实例,仓库默认私有)。
            echo "${TCR_PASSWORD}" | docker login our-chat.tencentcloudcr.com -u "${TCR_USERNAME}" --password-stdin
            export SERVER_IMAGE="${IMAGE_PREFIX}-server:${GIT_SHA}"
            export GATEWAY_IMAGE="${IMAGE_PREFIX}-gateway:${GIT_SHA}"
            export WEB_IMAGE="${IMAGE_PREFIX}-web:${GIT_SHA}"
            # —— 弱网容错:逐个应用镜像带重试拉取 ——
            # docker pull 失败重试会「续传已下载的层」,弱网抖动/卡顿不会让整次部署一击毙命;
            # 只拉应用镜像(每次变),基础镜像已缓存、交给随后的 up 命中本地、不再联网复检(那也走flaky源会卡)。
            for svc in server gateway web; do
              n=0
              until docker compose -f docker-compose.prod.yml pull "$svc"; do
                n=$((n+1))
                [ "$n" -ge 8 ] && { echo "::error::[$svc] 镜像拉取重试 8 次仍失败,放弃本次部署"; exit 1; }
                echo "[$svc] 第 $n 次拉取中断,15s 后重试(docker 续传已下层)…"; sleep 15
              done
            done
            # 镜像就位 → 起容器(基础镜像命中本地缓存,不再联网);server 启动自动 prisma migrate deploy。
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            docker logout our-chat.tencentcloudcr.com || true

            echo "✅ 部署完成：${GIT_SHA}"
            docker compose -f docker-compose.prod.yml ps
