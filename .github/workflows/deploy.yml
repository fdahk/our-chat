name: deploy

# 提交即自动部署（镜像在服务器本地构建，不跨墙）：
#   推送到 main → SSH 到服务器 → git fetch+reset 到本次提交 → 生成 .env/私钥 → docker compose build → up。
# 为什么不在 CI build 再推镜像：CI runner 在海外、服务器在国内，大镜像跨墙拉/推都不稳（GHCR blob 被墙、
#   Docker Hub 公益源大层易抖、TCR runner→国内上传大层会断）。改在服务器本地 build：源码仅 ~10MB 跨墙(git)，
#   依赖走国内源(npmmirror/goproxy.cn,compose build-arg 注入)，基础镜像走 daemon 镜像加速，全程不跨墙传大层。
# 配置分层：① 通用非机密在 compose 默认值；② 其余(机密 + 因环境而异的非机密)统一放 GitHub Secrets。
#   ② 由本工作流在部署时统一注入、在服务器生成 .env，服务器零手工维护。
# 想用 dev 触发，把 branches 改成 [dev]；workflow_dispatch 支持手动触发。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 部署到服务器（本地构建）
    runs-on: ubuntu-latest
    # 读取 environment(pro) 作用域下的 Secrets（SSH 私钥、机密、WEB_PUBLIC_ORIGIN 等）
    environment: pro
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      # 先校验 environment(pro) 里的 Secrets 是否都读到（缺啥报啥；也能验证 environment 名字配对）
      - name: 预检必填 Secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_INTERNAL_TOKEN: ${{ secrets.GATEWAY_INTERNAL_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OAUTH_PRIVATE_KEY_B64: ${{ secrets.OAUTH_PRIVATE_KEY_B64 }}
          WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN }}
          OAUTH_ACTIVE_KID: ${{ secrets.OAUTH_ACTIVE_KID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
        run: |
          miss=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY POSTGRES_PASSWORD JWT_SECRET GATEWAY_INTERNAL_TOKEN S3_ACCESS_KEY S3_SECRET_KEY OAUTH_PRIVATE_KEY_B64 WEB_PUBLIC_ORIGIN OAUTH_ACTIVE_KID S3_ENDPOINT S3_REGION S3_BUCKET S3_PUBLIC_BASE_URL; do
            if [ -z "${!v:-}" ]; then echo "❌ 缺少 Secret：$v"; miss=1; else echo "✓ Secret $v 已设置"; fi
          done
          if [ "$miss" -ne 0 ]; then
            echo "::error::有必填 Secret 读不到。确认它们都配在 environment『pro』的 Secrets 页下（本 job 已声明 environment: pro）。若你的环境名不是 pro，请改 workflow 里的 environment 值。"
            exit 1
          fi
          echo "✅ 所有必填 Secret 齐全（environment: pro 读取正常）"

      - name: 拉源码 + 生成 .env/私钥 + 本地构建 + 滚动重启
        uses: appleboy/ssh-action@v1.2.0
        env:
          # —— 源码/部署位置 ——
          # 公开仓库，免鉴权 clone；URL 由 GitHub 上下文派生，不硬编码 owner/repo。
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          GIT_SHA: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/our-chat' }}
          # —— ② 机密 + 因环境而异的非机密,统一走 GitHub Secrets ——
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_INTERNAL_TOKEN: ${{ secrets.GATEWAY_INTERNAL_TOKEN }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          OAUTH_PRIVATE_KEY_B64: ${{ secrets.OAUTH_PRIVATE_KEY_B64 }}
          WEB_PUBLIC_ORIGIN: ${{ secrets.WEB_PUBLIC_ORIGIN }}
          OAUTH_ACTIVE_KID: ${{ secrets.OAUTH_ACTIVE_KID }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: REPO_URL,GIT_SHA,DEPLOY_PATH,POSTGRES_PASSWORD,JWT_SECRET,GATEWAY_INTERNAL_TOKEN,S3_ACCESS_KEY,S3_SECRET_KEY,OAUTH_PRIVATE_KEY_B64,WEB_PUBLIC_ORIGIN,OAUTH_ACTIVE_KID,S3_ENDPOINT,S3_REGION,S3_BUCKET,S3_PUBLIC_BASE_URL,POSTGRES_USER,POSTGRES_DB
          # 冷启动首次本地 build(拉基础镜像 + pnpm install + 编译 3 个服务)偏慢,放宽到 40m;之后命中层缓存很快。
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            umask 077
            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            # —— 取源码：首次 clone,之后 fetch+reset 到本次提交;弱网带重试(git 自带续传) ——
            if [ ! -d repo/.git ]; then
              n=0
              until git clone "${REPO_URL}" repo; do
                n=$((n+1)); [ "$n" -ge 5 ] && { echo "::error::git clone 重试 5 次仍失败"; exit 1; }
                echo "git clone 第 $n 次失败,10s 后重试…"; sleep 10
              done
            fi
            cd repo
            n=0
            until git fetch --prune origin; do
              n=$((n+1)); [ "$n" -ge 5 ] && { echo "::error::git fetch 重试 5 次仍失败"; exit 1; }
              echo "git fetch 第 $n 次失败,10s 后重试…"; sleep 10
            done
            # 精确切到触发本次部署的提交(reset --hard 只动追踪文件,不删 .env/keys/certbot-www 等未追踪文件)。
            git reset --hard "${GIT_SHA}"

            # compose 在 repo/docker/ 运行;.env、keys、certbot-www 都落在这里(与 compose 的相对挂载对齐)。
            cd docker
            # keys: OAuth 私钥; certbot-www: HTTPS 证书续期的 webroot 挑战目录
            mkdir -p keys certbot-www

            # 跨项目共享网络（与 agent-server 互通）：compose 以 external 引用，必须先存在。
            # 幂等创建——无论 our-chat 还是 agent-server 谁先部署，都能把它建出来。
            docker network inspect oc-shared >/dev/null 2>&1 || docker network create oc-shared

            # —— 写 OAuth 生产私钥（base64 secret 解码）——
            printf '%s' "${OAUTH_PRIVATE_KEY_B64}" | base64 -d > keys/oauth-private-prod.pem
            # 容器内 server 以非 root 用户(app)运行,uid 与宿主 ubuntu(1000)不同;私钥需对其可读,
            # 否则启动读 key 报 EACCES。单租户服务器 + :ro 挂载,644 可接受。
            chmod 644 keys/oauth-private-prod.pem

            # —— 生成 .env（仅 ②③；①通用默认在 compose）。CLIENT_ORIGINS/OAUTH_* 由 WEB_PUBLIC_ORIGIN 派生，三处天然一致 ——
            {
              echo "POSTGRES_USER=${POSTGRES_USER:-postgres}"
              echo "POSTGRES_DB=${POSTGRES_DB:-our_chat}"
              echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "GATEWAY_INTERNAL_TOKEN=${GATEWAY_INTERNAL_TOKEN}"
              echo "OAUTH_ACTIVE_KID=${OAUTH_ACTIVE_KID}"
              echo "CLIENT_ORIGINS=${WEB_PUBLIC_ORIGIN}"
              echo "OAUTH_ISSUER_BASE_URL=${WEB_PUBLIC_ORIGIN}"
              echo "OAUTH_WEB_REDIRECT_URI=${WEB_PUBLIC_ORIGIN}/oauth/callback"
              echo "S3_ENDPOINT=${S3_ENDPOINT}"
              echo "S3_REGION=${S3_REGION}"
              echo "S3_BUCKET=${S3_BUCKET}"
              echo "S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}"
              echo "S3_ACCESS_KEY=${S3_ACCESS_KEY}"
              echo "S3_SECRET_KEY=${S3_SECRET_KEY}"
            } > .env
            chmod 600 .env

            # web 镜像在构建期需 WEB_PUBLIC_ORIGIN(compose build-arg 从 shell env 取);导出供 build 读取。
            export WEB_PUBLIC_ORIGIN

            # —— 本地构建镜像 ——
            # 依赖源走国内(server/web 的 NPM_REGISTRY、gateway 的 GOPROXY_URL 已在 compose build-args 内置);
            # 基础镜像(node/golang/nginx/alpine)走 daemon 配置的镜像加速;全程不跨墙传大层。
            docker compose -f docker-compose.prod.yml build
            # 起容器(基础镜像/已构建镜像均在本地);server 启动自动 prisma migrate deploy。
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # 清理重建后产生的悬空镜像层,省磁盘。
            docker image prune -f

            echo "✅ 部署完成：${GIT_SHA}"
            docker compose -f docker-compose.prod.yml ps
