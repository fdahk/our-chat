version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/our-chat/gateway/internal/contracts/gen
plugins:
  - remote: buf.build/community/stephenh-ts-proto:v2.11.8
    out: server/src/contracts/gen
    opt:
      - onlyTypes=true
      - forceLong=number
      - useDate=string
      - useOptionals=messages
      - esModuleInterop=true
  - remote: buf.build/community/stephenh-ts-proto:v2.11.8
    out: web/src/contracts/gen
    opt:
      - onlyTypes=true
      - forceLong=number
      - useDate=string
      - useOptionals=messages
      - esModuleInterop=true
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gateway/internal/contracts/gen
    opt:
      - paths=source_relative
  # mobile-swift 已改用 OpenAPI(openapi/openapi.yaml + swift-openapi-generator)生成惯用 Codable,
  # 不再用 SwiftProtobuf(二进制类、命名分叉、对 JSON-REST 不友好),故移除 apple/swift 插件。
