# CI:每次 push / PR 都跑
#   - typecheck
#   - test(含 vitest 122 用例,无 DB 集成测试因为 mock 已覆盖)
#   - lint
#   - docker build(仅 build 验证 Dockerfile 可用,不 push)
#
# 触发:push 到任何分支 + 所有 PR

name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ['main', 'dev']

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  docker:
    name: Docker build(验证 Dockerfile 可用,不 push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          target: runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: our-chat-server:ci
