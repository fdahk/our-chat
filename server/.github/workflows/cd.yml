# CD:推送到 main / 打 tag 时 build 并推镜像到 GHCR(GitHub Container Registry)
#
# 触发:
#   - push to main:tag = sha-<short> + latest
#   - tag v*.*.*    :tag = v1.2.3 + 1.2 + 1 + latest
#
# 镜像:ghcr.io/<owner>/<repo>-server:<tag>
#
# 后续 deploy(到 K8s / ECS / SSH):workflow_dispatch 手动触发或独立 workflow

name: CD

on:
  push:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push_tags:
    branches: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-server

jobs:
  build-push:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push runner image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          target: runner
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
