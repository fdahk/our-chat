syntax = "proto3";

package ourchat.call.v1;

// 通话参与者精简信息。
message CallUser {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
}

// WebRTC 会话描述(RTCSessionDescriptionInit)。
message SessionDescription {
  string type = 1; // offer | answer
  string sdp = 2;
}

// WebRTC ICE 候选。
message IceCandidate {
  string candidate = 1;
  optional int32 sdp_mline_index = 2;
  optional string sdp_mid = 3;
}

// call:start 发起通话。
message CallStart {
  string call_id = 1; // call_{fromId}_{toId}_{timestamp}
  CallUser from = 2;
  CallUser to = 3;
  SessionDescription offer = 4;
  string call_type = 5; // voice | video,视频复用同一套信令
}

// call:accept 接听。from/to 为 user id(现状如此,与 call:start 的对象形态不同)。
message CallAccept {
  string call_id = 1;
  int64 from = 2;
  int64 to = 3;
  SessionDescription answer = 4;
}

// call:reject 拒接。
message CallReject {
  string call_id = 1;
}

// call:end 挂断。
message CallEnd {
  string call_id = 1;
}

// call:ice ICE 候选交换。
message CallIce {
  string call_id = 1;
  IceCandidate candidate = 2;
}

// call:rejoin 刷新/断连后重新入会:重连方新建 PeerConnection,携新 offer 请求对端重协商。
message CallRejoin {
  string call_id = 1;
  CallUser from = 2;
  CallUser to = 3;
  SessionDescription offer = 4;
}

// call:busy 服务端→主叫:被叫已在另一通通话中(忙线),不振铃。
message CallBusy {
  string call_id = 1;
}

// call:handled 服务端→被叫的其它设备/标签页:该通话已在别处被处理,停止振铃。
message CallHandled {
  string call_id = 1;
  string status = 2; // accepted | rejected | ended
}

// call:peer-reconnecting 服务端→对端:通话对方设备掉线,处于 grace 重连窗内。
message CallPeerReconnecting {
  string call_id = 1;
}
