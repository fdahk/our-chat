syntax = "proto3";

package ourchat.user.v1;

import "google/protobuf/timestamp.proto";

// 用户对象:登录/注册响应 data,各端共享。
message User {
  int64 id = 1; // JSON string
  string username = 2;
  string email = 3;
  string phone = 4;
  string nickname = 5;
  string avatar = 6;
  string bio = 7;
  string gender = 8;
  string status = 9; // online | offline | busy | away | deleted
  google.protobuf.Timestamp last_seen = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// 鉴权中间件注入到请求上下文的精简用户(req.user)。
message AuthUser {
  int64 id = 1;
  string username = 2;
  string email = 3;
  string nickname = 4;
  string avatar = 5;
  string status = 6;
}

// POST /api/login 请求体。
message LoginRequest {
  string username = 1;
  string password = 2;
  bool remember = 3;
}

// POST /api/register 请求体。
message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string phone = 4;
  string nickname = 5;
  string avatar = 6;
  string bio = 7;
}
