syntax = "proto3";

package ourchat.agent.v1;

import "google/protobuf/struct.proto";

// agent-server(RAG 知识库 + agent 编排)的契约。主键用 int32(agent-server 用 Int
// 避免 BigInt 在 Node 的 JSON 序列化坑);runId 等是字符串。

// 一键登录后前端只读的用户身份(GET /api/auth/me)。
// token 铸造/续期不在本契约里(走 our-chat BFF /oauth/agent-token)。
message AgentUser {
  int32 id = 1;
  string username = 2;
  string display_name = 3;
  string role_code = 4;
}

// 用户上传的文档。status: uploaded|parsing|chunking|embedding|ready|failed
message AgentDocument {
  int32 id = 1;
  string filename = 2;
  string mime_type = 3;
  int32 size_bytes = 4;
  string status = 5;
  int32 chunk_count = 6;
  optional string error_msg = 7;
  string created_at = 8; // ISO8601
  string updated_at = 9;
}

// 上传文档响应:文档 id + 触发的摄取作业 runId。
message UploadDocResp {
  int32 document_id = 1;
  string run_id = 2;
}

// RAG 引用:该回答引用了哪些 chunk。
message Citation {
  int32 chunk_id = 1;
  int32 document_id = 2;
  optional string filename = 3;
  double score = 4;
}

// 对话消息。role: user | assistant | system
message AgentMessage {
  int32 id = 1;
  int32 conversation_id = 2;
  string role = 3;
  string content = 4;
  repeated Citation citations = 5;
  string created_at = 6;
}

// 会话(含可选消息历史)。
message AgentConversation {
  int32 id = 1;
  string title = 2;
  string created_at = 3;
  string updated_at = 4;
  repeated AgentMessage messages = 5;
}

// 对话 SSE done 事件载荷:完成 + 引用列表。
message ChatDoneEvent {
  int32 message_id = 1;
  repeated Citation citations = 2;
}

// 运行事件(事件溯源:文档摄取 / agent 任务)。
// id: agent-server 把 sequenceNo 转成 string 给 SSE id(MessageEvent.lastEventId
// 协议本就是 string),保持 string 不要 Number() 以免非纯数字 id 被吞成 0。
// data 由 type 决定字段,故用任意 JSON。
message RunEvent {
  string id = 1;
  string type = 2;
  google.protobuf.Struct data = 3;
}

// 运行(泛化:摄取作业 + agent 任务共用)。
// kind: ingestion | agent_task;status: queued | running | succeeded | failed
message AgentRun {
  string run_id = 1;
  string kind = 2;
  string status = 3;
  optional string progress_msg = 4;
  string created_at = 5;
  repeated RunEvent events = 6;
}

// 提交 agent 任务响应。
message AgentTaskResp {
  string run_id = 1;
}
